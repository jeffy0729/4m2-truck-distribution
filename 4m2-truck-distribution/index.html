<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4米2轻卡城配业务分布</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0D1117;
            color: #E6EDF3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 地图占位区域 */
        .map-section {
            background: #161B22;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 24px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #30363D;
        }
        .map-placeholder { color: #8B949E; font-size: 18px; }
        
        /* 城市标记点（橙色） */
        .city-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #F7931A;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(247, 147, 26, 0.6);
        }
        
        /* 数据卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        /* 蓝色数据卡片 */
        .data-card {
            background: linear-gradient(135deg, #1F2937 0%, #161B22 100%);
            border: 1px solid #58A6FF;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .data-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(88, 166, 255, 0.15);
        }
        .card-title { color: #58A6FF; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .card-value { font-size: 32px; font-weight: 700; color: #fff; }
        .card-label { color: #8B949E; font-size: 14px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <h1 style="color: #F7931A; margin-bottom: 24px;">🚛 4米2轻卡城配业务分布</h1>
        
        <!-- 地图区域 -->
        <div class="map-section">
            <div class="map-placeholder">🗺️ 中国地图区域（数据加载中...）</div>
        </div>
        
        <!-- 数据卡片 -->
        <div class="cards-grid">
            <div class="data-card">
                <div class="card-title">🚗 北京</div>
                <div class="card-value">-</div>
                <div class="card-label">等待数据</div>
            </div>
            <div class="data-card">
                <div class="card-title">🚙 上海</div>
                <div class="card-value">-</div>
                <div class="card-label">等待数据</div>
            </div>
            <div class="data-card">
                <div class="card-title">🚕 深圳</div>
                <div class="card-value">-</div>
                <div class="card-label">等待数据</div>
            </div>
        </div>
    </div>
</body>
</html>
